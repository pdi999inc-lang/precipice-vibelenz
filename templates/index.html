<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VibeLenz</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b1020;
color:white;
}

.page{
max-width:1100px;
margin:auto;
padding:30px;
}

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.panel{
background:#121a31;
border-radius:14px;
padding:25px;
}

h1{
font-size:2.6rem;
margin-bottom:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #30456f;
background:#0e162b;
color:white;
}

button{
width:100%;
padding:14px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1e4ed8;
}

@media(max-width:768px){
.layout{
grid-template-columns:1fr;
}
h1{
font-size:2rem;
}
}

</style>
</head>

<body>

<div class="page">

<div class="layout">

<div class="panel">

<h1>Bring Their Intentions Into Focus</h1>

<p>
Upload screenshots of a conversation and VibeLenz will analyze the
interaction for manipulation signals, escalation patterns, and risk indicators.
</p>

</div>

<div class="panel">

<form action="/analyze-screenshots" method="post" enctype="multipart/form-data">

<label>Who is this conversation with?</label>

<select name="relationship_type" required>
<option value="stranger">New contact</option>
<option value="dating">Dating</option>
<option value="family">Family</option>
<option value="friend">Friend</option>
<option value="business">Business</option>
</select>

<label>Optional context</label>

<input name="context_note" type="text" placeholder="Example: Met on Facebook Marketplace">

<label>Upload screenshots</label>

<input type="file" name="screenshots" accept="image/*" multiple required>

<button type="submit">Analyze conversation</button>

</form>

</div>

</div>

</div>

</body>
</html>
