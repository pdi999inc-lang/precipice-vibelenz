<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeLenz — Conversation Safety Check</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.4rem;
    }
    .tagline {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }
    .upload-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }
    .upload-zone:hover { border-color: #555; }
    .upload-zone input[type="file"] {
      display: none;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .upload-text { color: #888; font-size: 0.9rem; }
    .upload-text span { color: #60a5fa; cursor: pointer; }
    #file-list {
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    #file-list li { padding: 0.25rem 0; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #374151; cursor: not-allowed; }
    .note {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #555;
      text-align: center;
    }
    .spinner { display: none; text-align: center; margin-top: 1rem; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>VibeLenz</h1>
    <p class="tagline">Upload conversation screenshots for a safety analysis.</p>

    <form id="upload-form" method="post" action="/analyze-screenshots" enctype="multipart/form-data">
      <label>Screenshots (up to 5 images)</label>
      <div class="upload-zone" id="drop-zone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">
          Drop images here or <span id="browse-link">browse</span>
        </div>
        <input type="file" name="files" id="file-input" accept=".png,.jpg,.jpeg" multiple />
      </div>

      <ul id="file-list"></ul>

      <button type="submit" class="btn" id="submit-btn" disabled>Analyze Conversation</button>
    </form>

    <div class="spinner" id="spinner">Analyzing… this may take a few seconds.</div>
    <p class="note">Max 5 images · PNG, JPG, JPEG · No data stored</p>
  </div>

  <script>
    const input = document.getElementById('file-input');
    const browseLink = document.getElementById('browse-link');
    const dropZone = document.getElementById('drop-zone');
    const fileList = document.getElementById('file-list');
    const submitBtn = document.getElementById('submit-btn');
    const form = document.getElementById('upload-form');
    const spinner = document.getElementById('spinner');

    browseLink.addEventListener('click', () => input.click());
    dropZone.addEventListener('click', (e) => { if (e.target !== browseLink) input.click(); });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#60a5fa'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#333'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#333';
      const dt = new DataTransfer();
      Array.from(e.dataTransfer.files).slice(0, 5).forEach(f => dt.items.add(f));
      input.files = dt.files;
      updateList();
    });

    input.addEventListener('change', updateList);

    function updateList() {
      fileList.innerHTML = '';
      const files = Array.from(input.files).slice(0, 5);
      files.forEach(f => {
        const li = document.createElement('li');
        li.textContent = `✓ ${f.name}`;
        fileList.appendChild(li);
      });
      submitBtn.disabled = files.length === 0;
    }

    form.addEventListener('submit', () => {
      submitBtn.disabled = true;
      spinner.style.display = 'block';
    });
  </script>
</body>
</html>
